{% extends "layout.html" %}

{% block body %}

<h2 class="text-center mb-4">Search Books</h2>

<form method="POST">
    <div class="form-group">
        <input type="text" name="query" class="form-control"
               placeholder="Search by ISBN, Title, or Author">
    </div>

    <button class="btn btn-danger btn-block">Search</button>
</form>

<hr>

<ul class="list-group">
{% for book in results %}
    <li class="list-group-item">
        <a href="{{ url_for('book', isbn=book.isbn) }}">
            <strong>{{ book.title }}</strong> by {{ book.author }} 
            <span class="text-muted">({{ book.year }})</span>
        </a>
    </li>


{% else %}
    {% if request.method == "POST" %}
        <li class="list-group-item text-center">No books match your search.</li>
    {% endif %}
{% endfor %}
</ul>

{%endblock%}
