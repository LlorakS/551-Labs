<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ENGO551 Lab 5 – IoT Geo Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Paho MQTT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --panel:     #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --danger:    #f85149;
      --warn:      #d29922;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    8px;
      --blue-dot:  #4da6ff;
      --green-dot: #3fb950;
      --red-dot:   #f85149;
    }

    html, body { height: 100%; font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    header h1 { font-size: 1rem; letter-spacing: 0.05em; color: var(--accent); }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--danger); flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--accent2); }

    /* ── Control Panel ── */
    #controls {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .field input, .field textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field input[disabled], .field textarea[disabled] { opacity: 0.45; cursor: not-allowed; }

    #host-input { width: 180px; }
    #port-input { width: 80px; }
    #topic-input { width: 200px; }
    #msg-input  { width: 220px; height: 60px; resize: none; }

    /* ── Buttons ── */
    .btn {
      padding: 7px 14px;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 0.82rem;
      cursor: pointer; font-weight: 600;
      letter-spacing: 0.04em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-connect    { background: var(--accent);  color: #000; }
    #btn-disconnect { background: var(--danger);  color: #fff; display: none; }
    #btn-publish    { background: var(--border);  color: var(--text); }
    #btn-share      { background: var(--accent2); color: #000; }

    /* ── Log ── */
    #log-wrap {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      max-height: 90px; overflow-y: auto;
    }
    #log { font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
    #log span { display: block; }
    #log .ok   { color: var(--accent2); }
    #log .err  { color: var(--danger);  }
    #log .info { color: var(--accent);  }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Custom Leaflet marker colours ── */
    .marker-blue  { filter: hue-rotate(200deg); }
    .marker-green { filter: hue-rotate(100deg); }
    .marker-red   { filter: hue-rotate(0deg);   }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div id="status-dot"></div>
    <h1>ENGO551 / Lab 5 — IoT Geo Tracker</h1>
  </header>

  <!-- Controls -->
  <div id="controls">

    <!-- Connection -->
    <div class="field">
      <label>Broker Host</label>
      <input id="host-input" type="text" value="test.mosquitto.org" placeholder="e.g. test.mosquitto.org"/>
    </div>
    <div class="field">
      <label>Port</label>
      <input id="port-input" type="number" value="8080" placeholder="8080"/>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end">
      <button class="btn" id="btn-connect">▶ Start</button>
      <button class="btn" id="btn-disconnect">■ End</button>
    </div>

    <!-- Publish -->
    <div class="field">
      <label>Topic</label>
      <input id="topic-input" type="text" value="ENGO_551/Karoll_Moyano/my_temperature" placeholder="course/name/topic"/>
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="msg-input" placeholder="Custom message…"></textarea>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end">
      <button class="btn" id="btn-publish"  disabled>⬆ Publish</button>
      <button class="btn" id="btn-share"    disabled>📍 Share My Status</button>
    </div>

  </div>

  <!-- Log -->
  <div id="log-wrap"><div id="log"></div></div>

  <!-- Map -->
  <div id="map"></div>

</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let client   = null;
let marker   = null;   // single marker for "my location"
let markers  = {};     // keyed by topic for multi-device support
const MAP_TOPIC_SUFFIX = '/my_temperature';

// ─────────────────────────────────────────────
//  MAP INIT  (Calgary as default centre)
// ─────────────────────────────────────────────
const map = L.map('map').setView([51.0447, -114.0719], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// ─────────────────────────────────────────────
//  LOG HELPER
// ─────────────────────────────────────────────
function log(msg, type = '') {
  const el = document.getElementById('log');
  const s  = document.createElement('span');
  s.className = type;
  s.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(s);           // newest on top
  if (el.children.length > 40) el.lastChild.remove();
}

// ─────────────────────────────────────────────
//  UI STATE HELPERS
// ─────────────────────────────────────────────
function setConnected(yes) {
  document.getElementById('host-input').disabled   = yes;
  document.getElementById('port-input').disabled   = yes;
  document.getElementById('btn-connect').style.display    = yes ? 'none'  : '';
  document.getElementById('btn-disconnect').style.display = yes ? ''      : 'none';
  document.getElementById('btn-publish').disabled  = !yes;
  document.getElementById('btn-share').disabled    = !yes;
  document.getElementById('status-dot').className  = yes ? 'connected' : '';
}

// ─────────────────────────────────────────────
//  MQTT CONNECT
// ─────────────────────────────────────────────
function connect() {
  const host = document.getElementById('host-input').value.trim();
  const port = parseInt(document.getElementById('port-input').value.trim(), 10);

  if (!host || !port) { log('Host and port are required.', 'err'); return; }

  // Unique client ID so multiple tabs don't clash
  const clientId = 'geo_' + Math.random().toString(16).slice(2, 10);
  client = new Paho.MQTT.Client(host, port, clientId);

  client.onConnectionLost = onConnectionLost;
  client.onMessageArrived = onMessageArrived;

  log(`Connecting to ${host}:${port} …`, 'info');

  client.connect({
    useSSL:    false,
    onSuccess: onConnected,
    onFailure: (err) => {
      log(`Connection failed: ${err.errorMessage}`, 'err');
    }
  });
}

function onConnected() {
  log('Connected ✓', 'ok');
  setConnected(true);

  // Auto-subscribe to the temperature topic so the map updates
  const topic = document.getElementById('topic-input').value.trim() || 'ENGO551/YourName/my_temperature';
  subscribeTo(topic);
}

function onConnectionLost(res) {
  log(`Connection lost: ${res.errorMessage} — reconnecting in 3 s…`, 'err');
  setConnected(false);
  setTimeout(connect, 3000);   // auto-reconnect
}

// ─────────────────────────────────────────────
//  SUBSCRIBE
// ─────────────────────────────────────────────
function subscribeTo(topic) {
  if (!client || !client.isConnected()) return;
  client.subscribe(topic);
  log(`Subscribed to: ${topic}`, 'info');
}

// ─────────────────────────────────────────────
//  MESSAGE ARRIVED → update map
// ─────────────────────────────────────────────
function onMessageArrived(message) {
  log(`MSG on [${message.destinationName}]: ${message.payloadString.slice(0, 80)}`);

  try {
    const geojson = JSON.parse(message.payloadString);
    if (geojson.type !== 'Feature') return;

    const coords = geojson.geometry.coordinates;   // [lng, lat]
    const temp   = geojson.properties.temperature;
    const latlng = [coords[1], coords[0]];

    // Choose colour based on temperature
    let colour = 'blue';
    if (temp >= 10 && temp < 30) colour = 'green';
    if (temp >= 30)              colour = 'red';

    // Build a coloured circle marker
    const circleOptions = {
      radius:      14,
      color:       colour === 'blue'  ? '#4da6ff'
                 : colour === 'green' ? '#3fb950'
                 :                      '#f85149',
      fillColor:   colour === 'blue'  ? '#4da6ff'
                 : colour === 'green' ? '#3fb950'
                 :                      '#f85149',
      fillOpacity: 0.85,
      weight:      2
    };

    const key = message.destinationName;

    if (markers[key]) {
      markers[key].setLatLng(latlng);
      markers[key].setStyle(circleOptions);
    } else {
      markers[key] = L.circleMarker(latlng, circleOptions).addTo(map);
    }

    markers[key].bindPopup(
      `<b>Temperature:</b> ${temp}°C<br/><b>Topic:</b> ${key}`
    );

    map.setView(latlng, map.getZoom());

  } catch (e) {
    // Not GeoJSON — just a plain text message, already logged above
  }
}

// ─────────────────────────────────────────────
//  PUBLISH – plain message
// ─────────────────────────────────────────────
function publish() {
  if (!client || !client.isConnected()) { log('Not connected.', 'err'); return; }

  const topic   = document.getElementById('topic-input').value.trim();
  const payload = document.getElementById('msg-input').value.trim();

  if (!topic || !payload) { log('Topic and message required.', 'err'); return; }

  const msg = new Paho.MQTT.Message(payload);
  msg.destinationName = topic;
  client.send(msg);
  log(`Published to [${topic}]: ${payload.slice(0, 60)}`, 'ok');
}

// ─────────────────────────────────────────────
//  SHARE MY STATUS — geolocation + random temp
// ─────────────────────────────────────────────
function shareStatus() {
  if (!client || !client.isConnected()) { log('Not connected.', 'err'); return; }
  if (!navigator.geolocation) { log('Geolocation not supported.', 'err'); return; }

  log('Getting GPS location…', 'info');

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat  = pos.coords.latitude;
      const lng  = pos.coords.longitude;
      const temp = parseFloat((Math.random() * 100 - 40).toFixed(1)); // –40 to 60

      const geojson = {
        type: 'Feature',
        geometry: {
          type:        'Point',
          coordinates: [lng, lat]
        },
        properties: {
          temperature: temp
        }
      };

      const topic   = document.getElementById('topic-input').value.trim()
                      || 'ENGO551/YourName/my_temperature';
      const payload = JSON.stringify(geojson);

      const msg = new Paho.MQTT.Message(payload);
      msg.destinationName = topic;
      client.send(msg);
      log(`Status shared → lat:${lat.toFixed(5)} lng:${lng.toFixed(5)} temp:${temp}°C`, 'ok');
    },
    (err) => {
      log(`Geolocation error: ${err.message}`, 'err');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ─────────────────────────────────────────────
//  DISCONNECT
// ─────────────────────────────────────────────
function disconnect() {
  if (client && client.isConnected()) {
    client.disconnect();
    log('Disconnected.', 'err');
  }
  setConnected(false);
}

// ─────────────────────────────────────────────
//  BUTTON WIRING
// ─────────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-disconnect').addEventListener('click', () => {
  // Override auto-reconnect when user intentionally ends
  if (client) client.onConnectionLost = () => {};
  disconnect();
  setConnected(false);
});
document.getElementById('btn-publish').addEventListener('click', publish);
document.getElementById('btn-share').addEventListener('click', shareStatus);

// Re-subscribe whenever the topic field changes while connected
document.getElementById('topic-input').addEventListener('change', () => {
  const topic = document.getElementById('topic-input').value.trim();
  if (topic) subscribeTo(topic);
});
</script>
</body>
</html>
