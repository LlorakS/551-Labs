<!doctype html>
<title>Search</title>
<h1>Search Books</h1>
<form method="POST">
    <input type="text" name="query" placeholder="Search by ISBN, title, or author">
    <input type="submit" value="Search">
</form>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul>
    {% for message in messages %}
      <li>{{ message }}</li>
    {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<ul>
{% for book in results %}
    <li>
        <a href="{{ url_for('book', isbn=book.isbn) }}">{{ book.title }} by {{ book.author }} ({{ book.year }})</a>
    </li>
{% endfor %}
</ul>

<a href="{{ url_for('logout') }}">Logout</a>
