<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Database</title>

    <!-- Bootstrap 4 CDN -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/background.jpg') }}") no-repeat center center fixed;
            background-size: cover;
        }

        .navbar-custom {
            background-color: rgba(128, 0, 0, 0.6);
        }

        .navbar-custom .navbar-brand,
        .navbar-custom .navbar-text {
            color: white;
            font-weight: bold;
            font-size: 24px;
        }

        .content-box {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 10px;
            margin-top: 100px;
        }
    </style>
</head>
<body>

<!-- Nav Bar -->
<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <img src="{{ url_for('static', filename='images/logo.jpg') }}"
         width="50" height="50" class="mr-3">

    <div class="mx-auto">
        <span class="navbar-text">Book Database</span>
    </div>
    {% if session.get("user_id") %}
      <a href = "{{ url_for('logout') }}" class = "btn btn-light btn-sm ml-auto">
        Logout
      </a>
    {% endif %}
</nav>

<!-- Page Content -->
<div class="container">
    <div class="content-box">
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} text-center">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block body %}
        {% endblock %}
    </div>
</div>

</body>
</html>
